name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Frontend Tests (Vitest) ───────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test:run

  # ── Backend Tests (Vitest via server/) ───────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Run backend tests
        working-directory: server
        run: npx vitest run
        env:
          NOMINATIM_URL: http://localhost
          OSRM_URL: http://localhost
          WEATHER_URL: http://localhost